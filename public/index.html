<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Needle MCP — Pipeline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#0a0e14;--bg-1:#0d1117;--bg-2:#161b22;--bg-3:#1c2129;--bg-4:#21262d;
  --border:#30363d;--border-light:#484f58;
  --fg-0:#e6edf3;--fg-1:#c9d1d9;--fg-2:#8b949e;--fg-3:#6e7681;
  --cyan:#58a6ff;--cyan-dim:#1f6feb;--green:#3fb950;--green-dim:#238636;
  --amber:#d29922;--amber-dim:#9e6a03;--red:#f85149;--red-dim:#da3633;
  --purple:#bc8cff;--pink:#f778ba;
  --font-ui:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'Cascadia Code',monospace;
}
html{font-size:13px;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-ui)}
body{height:100vh;overflow:hidden;display:grid;grid-template-columns:280px 1fr 340px;grid-template-rows:40px 1fr 260px;gap:1px;background:var(--border)}
body>*{background:var(--bg-1)}

/* ── Header bar ─────────────────────────────────────────────────────────── */
#header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--bg-0);border-bottom:1px solid var(--border);font-family:var(--font-mono)}
#header .logo{font-weight:700;font-size:14px;color:var(--cyan);letter-spacing:-.5px}
#header .logo span{color:var(--fg-3);font-weight:300}
#header .sep{width:1px;height:18px;background:var(--border)}
#header .status{font-size:11px;color:var(--fg-3);display:flex;align-items:center;gap:6px}
#header .status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
#header .status .dot.off{background:var(--fg-3)}
#header .run-chips{display:flex;gap:4px;margin-left:auto;overflow-x:auto;max-width:50vw;scrollbar-width:none}
#header .run-chips::-webkit-scrollbar{display:none}
.run-chip{font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:3px;background:var(--bg-3);color:var(--fg-2);cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:all .15s}
.run-chip:hover{border-color:var(--border-light);color:var(--fg-1)}
.run-chip.active{border-color:var(--cyan-dim);color:var(--cyan);background:var(--bg-4)}
.run-chip.running{border-color:var(--amber-dim);color:var(--amber)}
.run-chip.failed{border-color:var(--red-dim);color:var(--red)}

/* ── Left sidebar ───────────────────────────────────────────────────────── */
#sidebar{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--fg-3);padding:0 0 4px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--fg-2);font-weight:500}
.form-group select,.form-group input,.form-group textarea{
  font-family:var(--font-mono);font-size:12px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:4px;
  color:var(--fg-1);padding:6px 8px;outline:none;transition:border-color .15s;
  resize:vertical;
}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--cyan-dim)}
.form-group textarea{min-height:60px;line-height:1.4}
.toggle-row{display:flex;gap:12px}
.toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg-2);cursor:pointer;user-select:none}
.toggle input{appearance:none;width:28px;height:14px;background:var(--bg-4);border-radius:7px;position:relative;cursor:pointer;transition:background .15s}
.toggle input::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--fg-3);transition:all .15s}
.toggle input:checked{background:var(--cyan-dim)}
.toggle input:checked::after{left:16px;background:var(--cyan)}
#run-btn{
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  padding:8px 16px;border:none;border-radius:4px;cursor:pointer;
  background:var(--cyan-dim);color:#fff;transition:all .15s;
  letter-spacing:.3px;
}
#run-btn:hover{background:var(--cyan)}
#run-btn:disabled{opacity:.4;cursor:not-allowed}
#run-btn.running{background:var(--amber-dim);color:var(--amber)}
.presets{display:flex;flex-direction:column;gap:4px}
.preset-btn{
  font-family:var(--font-mono);font-size:11px;
  padding:6px 10px;border:1px solid var(--border);border-radius:4px;
  background:var(--bg-2);color:var(--fg-2);cursor:pointer;
  text-align:left;transition:all .15s;line-height:1.3;
}
.preset-btn:hover{border-color:var(--border-light);color:var(--fg-1);background:var(--bg-3)}
.preset-btn .preset-name{color:var(--cyan);font-weight:500}
.preset-btn .preset-q{color:var(--fg-3);font-size:10px;margin-top:2px;display:block}

/* ── Center timeline ────────────────────────────────────────────────────── */
#timeline-panel{overflow-y:auto;padding:12px 16px;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
#timeline-panel .section-label{margin-bottom:8px;position:sticky;top:0;background:var(--bg-1);padding:4px 0 8px;z-index:1}
.timeline{display:flex;flex-direction:column;gap:1px}
.step{
  display:grid;grid-template-columns:18px 1fr auto;gap:8px;align-items:start;
  padding:7px 10px;border-radius:4px;background:var(--bg-2);
  font-family:var(--font-mono);font-size:11px;
  transition:background .15s;position:relative;overflow:hidden;
}
.step::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--bg-4);transition:background .3s;
}
.step.done::before{background:var(--green)}
.step.active::before{background:var(--amber);animation:pulse-bar 1.2s ease-in-out infinite}
.step.failed::before{background:var(--red)}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.4}}
.step-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px}
.step.pending .step-icon{color:var(--fg-3)}
.step.active .step-icon{color:var(--amber)}
.step.done .step-icon{color:var(--green)}
.step.failed .step-icon{color:var(--red)}
.step-body{min-width:0}
.step-name{color:var(--fg-1);font-weight:500;font-size:11.5px}
.step-data{color:var(--fg-3);font-size:10px;margin-top:2px;line-height:1.4;word-break:break-all}
.step-data span{color:var(--fg-2)}
.step-timing{text-align:right;white-space:nowrap}
.step-ms{color:var(--fg-2);font-size:10px;font-weight:500}
.step-bar{height:3px;margin-top:3px;border-radius:2px;background:var(--bg-4);min-width:30px;max-width:120px;overflow:hidden;margin-left:auto}
.step-bar-fill{height:100%;border-radius:2px;background:var(--cyan-dim);transition:width .3s}
.step.active .step-bar-fill{background:var(--amber-dim);animation:bar-grow 1.5s ease-in-out infinite alternate}
@keyframes bar-grow{from{width:30%}to{width:90%}}
.empty-state{color:var(--fg-3);font-size:12px;text-align:center;padding:40px 20px;font-family:var(--font-mono);line-height:1.6}
.empty-state .icon{font-size:28px;margin-bottom:8px;opacity:.5}

/* ── Right evidence panel ───────────────────────────────────────────────── */
#evidence-panel{overflow:hidden;display:flex;flex-direction:column}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{font-family:var(--font-mono);font-size:11px;padding:8px 14px;color:var(--fg-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--fg-2)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{font-size:9px;background:var(--bg-4);color:var(--fg-3);padding:1px 5px;border-radius:3px;margin-left:4px}
.tab.active .badge{background:var(--cyan-dim);color:#fff}
.tab-content{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.tab-pane{display:none}
.tab-pane.active{display:block}
.evidence-empty{color:var(--fg-3);font-size:11px;text-align:center;padding:30px 10px;font-family:var(--font-mono)}
.hit-item{padding:6px 8px;border-radius:3px;margin-bottom:2px;background:var(--bg-2);font-family:var(--font-mono);font-size:10.5px;cursor:default;transition:background .1s}
.hit-item:hover{background:var(--bg-3)}
.hit-path{color:var(--cyan);font-weight:500}
.hit-line{color:var(--fg-3)}
.hit-score{color:var(--amber);float:right;font-size:10px}
.hit-text{color:var(--fg-2);margin-top:2px;white-space:pre-wrap;line-height:1.35;max-height:60px;overflow:hidden}
.deepread-item{margin-bottom:6px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.deepread-header{padding:6px 10px;background:var(--bg-3);font-family:var(--font-mono);font-size:11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.deepread-header:hover{background:var(--bg-4)}
.deepread-path{color:var(--cyan);font-weight:500}
.deepread-size{color:var(--fg-3);font-size:10px}
.deepread-chevron{color:var(--fg-3);transition:transform .15s;font-size:10px}
.deepread-item.open .deepread-chevron{transform:rotate(90deg)}
.deepread-content{display:none;max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.deepread-item.open .deepread-content{display:block}
.deepread-content pre{font-family:var(--font-mono);font-size:10px;line-height:1.4;color:var(--fg-2);padding:8px 10px;margin:0;white-space:pre-wrap;word-break:break-all}
.web-item{padding:6px 8px;border-radius:3px;margin-bottom:4px;background:var(--bg-2);font-size:11px}
.web-title{color:var(--purple);font-weight:500}
.web-url{color:var(--fg-3);font-size:10px;font-family:var(--font-mono);word-break:break-all}
.web-snippet{color:var(--fg-2);font-size:10.5px;margin-top:2px;line-height:1.35}

/* ── Bottom output panel ────────────────────────────────────────────────── */
#output-panel{grid-column:1/-1;overflow-y:auto;padding:12px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.output-empty{grid-column:1/-1;color:var(--fg-3);font-size:12px;text-align:center;padding:20px;font-family:var(--font-mono)}
.output-section{min-width:0}
.output-section h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--fg-3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.output-answer{font-size:12px;line-height:1.55;color:var(--fg-1)}
.output-answer code{font-family:var(--font-mono);font-size:11px;background:var(--bg-3);padding:1px 4px;border-radius:3px;color:var(--cyan)}
.output-code{background:var(--bg-0);border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:var(--font-mono);font-size:11px;line-height:1.45;color:var(--fg-1);white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.confidence-bar{height:8px;border-radius:4px;background:var(--bg-4);overflow:hidden;margin-top:4px;position:relative}
.confidence-fill{height:100%;border-radius:4px;transition:width .5s ease-out}
.confidence-label{font-family:var(--font-mono);font-size:12px;font-weight:600;margin-top:4px}
.citations-list{max-height:130px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.citation-item{font-family:var(--font-mono);font-size:10.5px;padding:4px 8px;border-radius:3px;margin-bottom:2px;background:var(--bg-2)}
.citation-file{color:var(--cyan);font-weight:500}
.citation-lines{color:var(--fg-3)}
.citation-snippet{color:var(--fg-2);margin-top:1px;white-space:pre-wrap;max-height:40px;overflow:hidden;font-size:10px}
.output-notes{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);line-height:1.4;background:var(--bg-2);padding:8px 10px;border-radius:4px;border-left:3px solid var(--amber-dim)}

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border)}

/* ── Animations ─────────────────────────────────────────────────────────── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeSlideIn .25s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--bg-4);border-top-color:var(--amber);border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<div id="header">
  <div class="logo">needle<span>.mcp</span></div>
  <div class="sep"></div>
  <div class="status">
    <div class="dot" id="sse-dot"></div>
    <span id="sse-label">connecting</span>
  </div>
  <div class="sep"></div>
  <div class="run-chips" id="run-chips"></div>
</div>

<!-- ── Sidebar ───────────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div class="section-label">Query</div>
  <div class="form-group">
    <label>Resource type</label>
    <select id="res-type">
      <option value="npm">npm</option>
      <option value="local">local</option>
      <option value="git">git</option>
    </select>
  </div>
  <div class="form-group">
    <label>Spec</label>
    <input type="text" id="res-spec" placeholder="e.g. rou3, ./path, git url">
  </div>
  <div class="form-group">
    <label>Question</label>
    <textarea id="question" placeholder="What do you want to know?"></textarea>
  </div>
  <div class="toggle-row">
    <label class="toggle"><input type="checkbox" id="opt-web"> Web</label>
    <label class="toggle"><input type="checkbox" id="opt-verify"> Verify</label>
  </div>
  <button id="run-btn">&#9654; Run Pipeline</button>

  <div class="section-label" style="margin-top:8px">Demo Presets</div>
  <div class="presets">
    <button class="preset-btn" data-type="npm" data-spec="rou3" data-q="How does rou3 match routes with path parameters and wildcards? Show the matching algorithm.">
      <span class="preset-name">rou3</span>
      <span class="preset-q">Route matching algorithm</span>
    </button>
    <button class="preset-btn" data-type="npm" data-spec="@anthropic-ai/sdk" data-q="How do I stream a chat completion response? Show the streaming API with tool use.">
      <span class="preset-name">@anthropic-ai/sdk</span>
      <span class="preset-q">Streaming chat + tool use</span>
    </button>
    <button class="preset-btn" data-type="npm" data-spec="zod" data-q="How does z.object().parse() validate nested objects? Show the internal validation pipeline.">
      <span class="preset-name">zod</span>
      <span class="preset-q">Object validation internals</span>
    </button>
  </div>
</div>

<!-- ── Timeline ──────────────────────────────────────────────────────────── -->
<div id="timeline-panel">
  <div class="section-label">Pipeline <span id="timeline-run-id" style="color:var(--fg-3);font-weight:300"></span></div>
  <div id="timeline" class="timeline">
    <div class="empty-state">
      <div class="icon">&#9671;</div>
      Run a query to see the<br>pipeline steps here
    </div>
  </div>
</div>

<!-- ── Evidence ──────────────────────────────────────────────────────────── -->
<div id="evidence-panel">
  <div class="tab-bar">
    <div class="tab active" data-tab="hits">Top Hits <span class="badge" id="hits-count">0</span></div>
    <div class="tab" data-tab="deepreads">Deep Reads <span class="badge" id="dr-count">0</span></div>
    <div class="tab" data-tab="web">Web <span class="badge" id="web-count">0</span></div>
  </div>
  <div class="tab-content">
    <div class="tab-pane active" id="pane-hits">
      <div class="evidence-empty" id="hits-empty">No evidence yet</div>
      <div id="hits-list"></div>
    </div>
    <div class="tab-pane" id="pane-deepreads">
      <div class="evidence-empty" id="dr-empty">No deep reads yet</div>
      <div id="dr-list"></div>
    </div>
    <div class="tab-pane" id="pane-web">
      <div class="evidence-empty" id="web-empty">No web evidence</div>
      <div id="web-list"></div>
    </div>
  </div>
</div>

<!-- ── Output ────────────────────────────────────────────────────────────── -->
<div id="output-panel">
  <div class="output-empty" id="output-empty">Output will appear when the pipeline completes</div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const STEPS = [
  'run.started','resource.resolved','surface.discovered',
  'evidence.collected','evidence.reranked','deepread.completed',
  'imports.followed','gaps.identified','iteration.pass2.completed',
  'web.collected','synthesis.completed','verify.completed',
  'run.completed','run.failed'
];
const STEP_LABELS = {
  'run.started':'Run Started','resource.resolved':'Resource Resolved',
  'surface.discovered':'API Surface Discovered','evidence.collected':'Evidence Collected',
  'evidence.reranked':'Evidence Reranked','deepread.completed':'Deep Read',
  'imports.followed':'Imports Followed','gaps.identified':'Gap Analysis',
  'iteration.pass2.completed':'Pass 2 Complete','synthesis.completed':'Synthesis',
  'verify.completed':'Verification','web.collected':'Web Evidence',
  'run.completed':'Run Completed','run.failed':'Run Failed'
};
const STEP_ICONS = {
  'run.started':'&#9654;','resource.resolved':'&#128230;','surface.discovered':'&#128269;',
  'evidence.collected':'&#128200;','evidence.reranked':'&#9733;','deepread.completed':'&#128196;',
  'imports.followed':'&#128279;','gaps.identified':'&#128300;','iteration.pass2.completed':'&#128260;',
  'synthesis.completed':'&#9889;','verify.completed':'&#10003;','web.collected':'&#127760;',
  'run.completed':'&#10004;','run.failed':'&#10060;'
};

let currentRunId = null;
let runEvents = new Map(); // runId -> NeedleEvent[]
let runStartTimes = new Map();
let stepTimes = new Map(); // runId -> Map<step, {start,end}>
let sseConnected = false;

// ── SSE ───────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/stream');
  es.onopen = () => {
    sseConnected = true;
    document.getElementById('sse-dot').classList.remove('off');
    document.getElementById('sse-label').textContent = 'connected';
  };
  es.onerror = () => {
    sseConnected = false;
    document.getElementById('sse-dot').classList.add('off');
    document.getElementById('sse-label').textContent = 'disconnected';
    setTimeout(connectSSE, 3000);
  };
  es.onmessage = (msg) => {
    try {
      const event = JSON.parse(msg.data);
      handleEvent(event);
    } catch {}
  };
}
connectSSE();

function handleEvent(event) {
  const {runId, step, ts, data} = event;
  if (!runEvents.has(runId)) runEvents.set(runId, []);
  runEvents.get(runId).push(event);

  if (!stepTimes.has(runId)) stepTimes.set(runId, new Map());
  const stMap = stepTimes.get(runId);

  if (step === 'run.started') {
    runStartTimes.set(runId, new Date(ts).getTime());
    // Mark first pipeline step as active
  }

  const startTime = runStartTimes.get(runId) || Date.now();
  const elapsed = new Date(ts).getTime() - startTime;
  stMap.set(step, elapsed);

  if (runId === currentRunId) {
    updateTimeline(runId);
    updateStepData(step, data);
  }

  if (step === 'run.completed' && runId === currentRunId) {
    fetchRunDetails(runId);
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').classList.remove('running');
    document.getElementById('run-btn').innerHTML = '&#9654; Run Pipeline';
  }
  if (step === 'run.failed' && runId === currentRunId) {
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').classList.remove('running');
    document.getElementById('run-btn').innerHTML = '&#9654; Run Pipeline';
  }

  updateRunChips();
}

// ── Timeline rendering ────────────────────────────────────────────────────
function updateTimeline(runId) {
  const events = runEvents.get(runId) || [];
  const stMap = stepTimes.get(runId) || new Map();
  const completedSteps = new Set(events.map(e => e.step));
  const evtByStep = new Map();
  for (const e of events) evtByStep.set(e.step, e);

  // Determine which steps to show
  const isComplete = completedSteps.has('run.completed') || completedSteps.has('run.failed');
  const visibleSteps = STEPS.filter(s => {
    if (completedSteps.has(s)) return true;
    if (!isComplete && s !== 'run.failed') return true;
    return false;
  });

  // Find max elapsed for bar scaling
  const maxElapsed = Math.max(1, ...[...stMap.values()]);

  const container = document.getElementById('timeline');
  container.innerHTML = '';

  let prevElapsed = 0;
  for (const step of visibleSteps) {
    const done = completedSteps.has(step);
    const isFailed = step === 'run.failed' && done;
    // Figure out if step is "active" (next expected step)
    const isActive = !done && !isComplete && getNextExpectedStep(completedSteps) === step;
    const elapsed = stMap.get(step);
    const stepDuration = elapsed !== undefined ? Math.max(0, elapsed - prevElapsed) : null;
    if (elapsed !== undefined) prevElapsed = elapsed;

    const div = document.createElement('div');
    div.className = `step ${done ? (isFailed ? 'failed' : 'done') : (isActive ? 'active' : 'pending')}`;
    if (done) div.classList.add('animate-in');

    const barWidth = elapsed !== undefined ? Math.max(5, (elapsed / maxElapsed) * 100) : 0;
    const evt = evtByStep.get(step);
    const dataSummary = evt ? formatStepData(step, evt.data) : '';

    div.innerHTML = `
      <div class="step-icon">${done ? (isFailed ? STEP_ICONS[step] : STEP_ICONS[step]) : (isActive ? '<div class="spinner"></div>' : '&#9675;')}</div>
      <div class="step-body">
        <div class="step-name">${STEP_LABELS[step] || step}</div>
        ${dataSummary ? `<div class="step-data">${dataSummary}</div>` : ''}
      </div>
      <div class="step-timing">
        ${stepDuration !== null ? `<div class="step-ms">${stepDuration >= 1000 ? (stepDuration/1000).toFixed(1)+'s' : stepDuration+'ms'}</div>` : ''}
        <div class="step-bar"><div class="step-bar-fill" style="width:${barWidth}%"></div></div>
      </div>
    `;
    container.appendChild(div);
  }
}

function getNextExpectedStep(completedSteps) {
  for (const s of STEPS) {
    if (!completedSteps.has(s) && s !== 'run.failed') return s;
  }
  return null;
}

function formatStepData(step, data) {
  if (!data) return '';
  switch (step) {
    case 'run.started':
      return `<span>${data.resource?.type}:</span> ${esc(data.resource?.spec || '')}`;
    case 'resource.resolved':
      return `<span>dir:</span> ${esc(truncPath(data.dir || ''))}`;
    case 'surface.discovered':
      return `<span>${data.symbolsCount}</span> symbols, <span>${data.entrypointsCount}</span> entrypoints${data.topSymbols?.length ? '<br>' + data.topSymbols.slice(0,5).map(s=>'<span>'+esc(s)+'</span>').join(' ') : ''}`;
    case 'evidence.collected':
      return `<span>${data.hits}</span> hits, <span>${data.deepReadCount}</span> deep reads (${formatBytes(data.totalDeepReadBytes||0)})`;
    case 'evidence.reranked':
      return `<span>${data.hits}</span> reranked`;
    case 'deepread.completed':
      return data.deepReadFiles?.map(f=>`<span>${esc(f.path)}</span>`).slice(0,4).join(', ') || '';
    case 'imports.followed':
      return data.filesRead ? `<span>${data.filesRead}</span> files followed` : '';
    case 'gaps.identified':
      return data.queries?.slice(0,3).map(q=>`<span>${esc(q)}</span>`).join(', ') || '';
    case 'iteration.pass2.completed':
      return data.newHits !== undefined ? `<span>${data.newHits}</span> new hits` : '';
    case 'synthesis.completed':
      return `confidence: <span>${(data.confidence*100).toFixed(0)}%</span>, <span>${data.citationsCount}</span> citations`;
    case 'verify.completed':
      if (data.skipped) return '<span style="color:var(--amber)">skipped</span>';
      return data.success ? '<span style="color:var(--green)">passed</span>' : '<span style="color:var(--red)">failed</span>';
    case 'web.collected':
      return `<span>${data.hits}</span> sources`;
    case 'run.completed':
      return `confidence: <span>${(data.confidence*100).toFixed(0)}%</span>`;
    case 'run.failed':
      return `<span style="color:var(--red)">${esc((data.error||'').slice(0,80))}</span>`;
    default:
      return '';
  }
}

function updateStepData(step, data) {
  // Update evidence panel inline counts from events
  if (step === 'evidence.collected' && data) {
    document.getElementById('hits-count').textContent = data.hits || 0;
    document.getElementById('dr-count').textContent = data.deepReadCount || 0;
  }
  if (step === 'web.collected' && data) {
    document.getElementById('web-count').textContent = data.hits || 0;
  }
}

// ── Run chips ─────────────────────────────────────────────────────────────
function updateRunChips() {
  const container = document.getElementById('run-chips');
  container.innerHTML = '';
  const ids = [...runEvents.keys()].reverse();
  for (const id of ids.slice(0, 20)) {
    const events = runEvents.get(id);
    const lastStep = events[events.length-1]?.step;
    const isCurrent = id === currentRunId;
    const isRunning = lastStep && !['run.completed','run.failed'].includes(lastStep);
    const isFailed = lastStep === 'run.failed';

    const chip = document.createElement('div');
    chip.className = `run-chip${isCurrent ? ' active' : ''}${isRunning ? ' running' : ''}${isFailed ? ' failed' : ''}`;
    chip.textContent = id.replace('run_','').slice(0,8);
    chip.title = id;
    chip.onclick = () => selectRun(id);
    container.appendChild(chip);
  }
}

async function selectRun(runId) {
  currentRunId = runId;
  document.getElementById('timeline-run-id').textContent = runId;
  updateTimeline(runId);
  updateRunChips();

  const events = runEvents.get(runId) || [];
  const isComplete = events.some(e => e.step === 'run.completed');
  if (isComplete) {
    await fetchRunDetails(runId);
  } else {
    clearOutput();
    clearEvidence();
  }
}

// ── Fetch run details ─────────────────────────────────────────────────────
async function fetchRunDetails(runId) {
  try {
    const res = await fetch(`/api/runs/${runId}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.output) renderOutput(data.output);
    if (data.output?.evidence?.hits) renderHits(data.output.evidence.hits);
    // Deep reads come from events
    const evts = runEvents.get(runId) || [];
    const eCollected = evts.find(e => e.step === 'evidence.collected');
    if (eCollected?.data?.deepReadFiles) {
      renderDeepReads(eCollected.data.deepReadFiles);
    }
    // Web evidence from events
    const webEvt = evts.find(e => e.step === 'web.collected');
    if (webEvt?.data?.sources) {
      renderWebEvidence(webEvt.data.sources);
    }
  } catch {}
}

// ── Evidence rendering ────────────────────────────────────────────────────
function renderHits(hits) {
  const list = document.getElementById('hits-list');
  const empty = document.getElementById('hits-empty');
  list.innerHTML = '';
  if (!hits || hits.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  document.getElementById('hits-count').textContent = hits.length;

  for (const h of hits.slice(0, 100)) {
    const div = document.createElement('div');
    div.className = 'hit-item';
    div.innerHTML = `
      <span class="hit-score">${h.score?.toFixed(1) || '?'}</span>
      <span class="hit-path">${esc(h.path)}</span><span class="hit-line">:${h.lineNumber}</span>
      <div class="hit-text">${esc(h.text || '')}</div>
    `;
    list.appendChild(div);
  }
}

function renderDeepReads(files) {
  const list = document.getElementById('dr-list');
  const empty = document.getElementById('dr-empty');
  list.innerHTML = '';
  if (!files || files.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  document.getElementById('dr-count').textContent = files.length;

  for (const f of files) {
    const div = document.createElement('div');
    div.className = 'deepread-item';
    div.innerHTML = `
      <div class="deepread-header">
        <span class="deepread-path">${esc(f.path)}</span>
        <span><span class="deepread-size">${formatBytes(f.sizeBytes||0)}</span> <span class="deepread-chevron">&#9654;</span></span>
      </div>
      <div class="deepread-content"><pre>${esc(f.content || '(content available in full run details)')}</pre></div>
    `;
    div.querySelector('.deepread-header').onclick = () => div.classList.toggle('open');
    list.appendChild(div);
  }
}

function renderWebEvidence(sources) {
  const list = document.getElementById('web-list');
  const empty = document.getElementById('web-empty');
  list.innerHTML = '';
  if (!sources || sources.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  document.getElementById('web-count').textContent = sources.length;

  for (const s of sources) {
    const div = document.createElement('div');
    div.className = 'web-item';
    div.innerHTML = `
      <div class="web-title">${esc(s.title || '')}</div>
      <div class="web-url">${esc(s.url || '')}</div>
      ${s.snippet ? `<div class="web-snippet">${esc(s.snippet)}</div>` : ''}
    `;
    list.appendChild(div);
  }
}

function clearEvidence() {
  document.getElementById('hits-list').innerHTML = '';
  document.getElementById('dr-list').innerHTML = '';
  document.getElementById('web-list').innerHTML = '';
  document.getElementById('hits-empty').style.display = '';
  document.getElementById('dr-empty').style.display = '';
  document.getElementById('web-empty').style.display = '';
  document.getElementById('hits-count').textContent = '0';
  document.getElementById('dr-count').textContent = '0';
  document.getElementById('web-count').textContent = '0';
}

// ── Output rendering ──────────────────────────────────────────────────────
function renderOutput(output) {
  const panel = document.getElementById('output-panel');
  const empty = document.getElementById('output-empty');
  if (empty) empty.remove();
  panel.innerHTML = '';

  // Left column: answer + code
  const left = document.createElement('div');
  left.className = 'output-section';

  const conf = output.confidence || 0;
  const confColor = conf >= 0.7 ? 'var(--green)' : conf >= 0.4 ? 'var(--amber)' : 'var(--red)';

  left.innerHTML = `
    <h3>&#9889; Answer</h3>
    <div class="output-answer">${formatAnswer(output.answer || '')}</div>
    ${output.code ? `<h3 style="margin-top:12px">&#128196; Code</h3><pre class="output-code">${esc(output.code)}</pre>` : ''}
    ${output.notes ? `<h3 style="margin-top:12px">&#128221; Notes</h3><div class="output-notes">${esc(output.notes)}</div>` : ''}
  `;
  panel.appendChild(left);

  // Right column: confidence + citations
  const right = document.createElement('div');
  right.className = 'output-section';
  right.innerHTML = `
    <h3>Confidence</h3>
    <div class="confidence-label" style="color:${confColor}">${(conf*100).toFixed(0)}%</div>
    <div class="confidence-bar"><div class="confidence-fill" style="width:${conf*100}%;background:${confColor}"></div></div>
    ${output.citations?.length ? `
      <h3 style="margin-top:12px">&#128279; Citations (${output.citations.length})</h3>
      <div class="citations-list">
        ${output.citations.map(c => `
          <div class="citation-item">
            <span class="citation-file">${esc(c.file)}</span><span class="citation-lines">:${esc(c.lines)}</span>
            <div class="citation-snippet">${esc(c.snippet)}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${output.nextQueries?.length ? `
      <h3 style="margin-top:12px">&#128161; Follow-up Queries</h3>
      <div style="font-size:11px;color:var(--fg-2);line-height:1.5">
        ${output.nextQueries.map(q => `<div style="padding:2px 0">&#8226; ${esc(q)}</div>`).join('')}
      </div>
    ` : ''}
  `;
  panel.appendChild(right);
}

function clearOutput() {
  const panel = document.getElementById('output-panel');
  panel.innerHTML = '<div class="output-empty" id="output-empty">Output will appear when the pipeline completes</div>';
}

function formatAnswer(text) {
  // Basic markdown-ish: inline code, bold, line breaks
  return esc(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+):([^\]]+)\]/g, '<code style="color:var(--cyan)">$1:$2</code>')
    .replace(/\n/g, '<br>');
}

// ── Run action ────────────────────────────────────────────────────────────
async function startRun() {
  const type = document.getElementById('res-type').value;
  const spec = document.getElementById('res-spec').value.trim();
  const question = document.getElementById('question').value.trim();
  if (!spec || !question) return;

  const body = {
    resource: { type, spec },
    question,
    options: {
      enableWeb: document.getElementById('opt-web').checked,
      verify: document.getElementById('opt-verify').checked,
    }
  };

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.classList.add('running');
  btn.innerHTML = '<div class="spinner" style="width:10px;height:10px;border-width:1.5px;vertical-align:middle;margin-right:6px"></div> Running...';

  clearOutput();
  clearEvidence();

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.runId) {
      currentRunId = data.runId;
      document.getElementById('timeline-run-id').textContent = data.runId;
      // Clear timeline
      document.getElementById('timeline').innerHTML = '';
      updateTimeline(data.runId);
      updateRunChips();
    }
  } catch (err) {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.innerHTML = '&#9654; Run Pipeline';
  }
}

// ── Event listeners ───────────────────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', startRun);

// Presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('res-type').value = btn.dataset.type;
    document.getElementById('res-spec').value = btn.dataset.spec;
    document.getElementById('question').value = btn.dataset.q;
    startRun();
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`pane-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function truncPath(p) {
  if (p.length <= 50) return p;
  return '...' + p.slice(-47);
}
function formatBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + 'KB';
  return (b/1024/1024).toFixed(1) + 'MB';
}

// ── Load run history on start ─────────────────────────────────────────────
(async () => {
  try {
    const res = await fetch('/api/runs');
    if (res.ok) {
      const runs = await res.json();
      // Populate chips from history
      for (const r of runs.reverse()) {
        if (!runEvents.has(r.runId)) runEvents.set(r.runId, []);
        // Synthesize minimal events for chip display
        const fakeEvt = {runId:r.runId,ts:r.startedAt,step:r.status==='completed'?'run.completed':r.status==='failed'?'run.failed':'run.started',data:{}};
        runEvents.get(r.runId).push(fakeEvt);
      }
      updateRunChips();
    }
  } catch {}
})();
</script>
